rules:
  - id: hardcoded-aws-access-key
    pattern-regex: 'AKIA[0-9A-Z]{16}'
    message: |
      Hardcoded AWS Access Key found!
      This will expose your AWS account if pushed to Git.
      Fix: Use environment variables -> os.environ.get('AWS_ACCESS_KEY')
    languages: [python, javascript, java]
    severity: ERROR
    metadata:
      cwe: CWE-798
      owasp: A02:2021-Cryptographic-Failures
      author: Anant

  - id: hardcoded-db-password
    patterns:
      - pattern: $VAR = "$PASSWORD"
      - metavariable-regex:
          metavariable: $VAR
          regex: '.*(password|passwd|pwd|secret|key).*'
      - metavariable-regex:
          metavariable: $PASSWORD
          regex: '.{4,}'
    message: |
      Hardcoded password/secret found in variable: $VAR
      Fix: Use environment variables -> os.environ.get('DB_PASSWORD')
    languages: [python]
    severity: ERROR
    metadata:
      cwe: CWE-798
      owasp: A02:2021-Cryptographic-Failures
      author: Anant

  - id: hardcoded-secret-key
    patterns:
      - pattern: $VAR = "$VALUE"
      - metavariable-regex:
          metavariable: $VAR
          regex: '.*(SECRET|secret|token|TOKEN).*'
    message: |
      Hardcoded secret/token found: $VAR
      Fix: Move to environment variables.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: CWE-798
      owasp: A02:2021-Cryptographic-Failures
      author: Anant
